<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgTri" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgTri)"/>
  <text x="400" y="40" font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="middle">Trois logiques de surveillance, un même substrat technique</text>
  <text x="400" y="64" font-size="13" fill="#94a3b8" text-anchor="middle">Le Big Data comme infrastructure commune</text>

  <g>
    <circle cx="220" cy="220" r="105" fill="#3b82f6" fill-opacity="0.35" stroke="#60a5fa" stroke-width="2"/>
    <text x="220" y="180" font-size="18" font-weight="700" fill="#dbeafe" text-anchor="middle">PRIVÉE</text>
    <text x="220" y="205" font-size="12" fill="#bfdbfe" text-anchor="middle">monétisation</text>
    <text x="220" y="225" font-size="11" fill="#bfdbfe" text-anchor="middle">GAFAM · adtech</text>
    <text x="220" y="245" font-size="11" fill="#bfdbfe" text-anchor="middle">cookies tiers · RTB</text>
  </g>

  <g>
    <circle cx="580" cy="220" r="105" fill="#ef4444" fill-opacity="0.35" stroke="#fca5a5" stroke-width="2"/>
    <text x="580" y="180" font-size="18" font-weight="700" fill="#fee2e2" text-anchor="middle">PUBLIQUE</text>
    <text x="580" y="205" font-size="12" fill="#fecaca" text-anchor="middle">sécurité · fiscalité</text>
    <text x="580" y="225" font-size="11" fill="#fecaca" text-anchor="middle">PRISM (NSA)</text>
    <text x="580" y="245" font-size="11" fill="#fecaca" text-anchor="middle">fichier TES · vidéo IA</text>
  </g>

  <g>
    <circle cx="400" cy="370" r="105" fill="#f59e0b" fill-opacity="0.35" stroke="#fcd34d" stroke-width="2"/>
    <text x="400" y="350" font-size="18" font-weight="700" fill="#fef3c7" text-anchor="middle">HYBRIDE</text>
    <text x="400" y="372" font-size="12" fill="#fde68a" text-anchor="middle">organisations</text>
    <text x="400" y="392" font-size="11" fill="#fde68a" text-anchor="middle">logs salariés · BYOD</text>
    <text x="400" y="410" font-size="11" fill="#fde68a" text-anchor="middle">télémétrie postes</text>
  </g>

  <g>
    <circle cx="400" cy="270" r="55" fill="#8b5cf6" fill-opacity="0.55" stroke="#c4b5fd" stroke-width="2"/>
    <text x="400" y="265" font-size="14" font-weight="700" fill="#f5f3ff" text-anchor="middle">BIG DATA</text>
    <text x="400" y="285" font-size="11" fill="#ede9fe" text-anchor="middle">5 V · 175 Zo</text>
  </g>
