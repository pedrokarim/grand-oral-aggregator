  <g>
    <rect x="160" y="319" width="80" height="81" fill="#64748b" rx="3"/>
    <text x="200" y="312" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="middle">2 800</text>

    <rect x="310" y="280" width="80" height="120" fill="#64748b" rx="3"/>
    <text x="350" y="273" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="middle">4 159</text>

    <rect x="460" y="264" width="80" height="136" fill="#64748b" rx="3"/>
