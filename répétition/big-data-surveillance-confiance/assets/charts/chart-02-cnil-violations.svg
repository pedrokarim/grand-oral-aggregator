<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bgRed)"/>
  <text x="400" y="40" font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="middle">Notifications de violations de données à la CNIL</text>
  <text x="400" y="64" font-size="13" fill="#94a3b8" text-anchor="middle">Source : Rapport annuel CNIL 2024 — bilan contentieux 2024</text>

  <line x1="100" y1="400" x2="700" y2="400" stroke="#475569" stroke-width="1.5"/>
  <line x1="100" y1="400" x2="100" y2="110" stroke="#475569" stroke-width="1.5"/>

  <g font-size="11" fill="#94a3b8" text-anchor="end">
