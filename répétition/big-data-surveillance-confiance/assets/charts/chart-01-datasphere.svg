    <line x1="80" y1="264" x2="760" y2="264"/>
    <line x1="80" y1="184" x2="760" y2="184"/>
    <line x1="80" y1="124" x2="760" y2="124"/>
  </g>

  <g font-size="12" fill="#cbd5e1" text-anchor="middle">
