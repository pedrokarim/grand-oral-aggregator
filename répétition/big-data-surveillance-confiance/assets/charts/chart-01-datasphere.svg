    <text x="290" y="445">2020</text>
    <text x="420" y="445">2022</text>
    <text x="550" y="445">2023</text>
    <text x="680" y="445">2025</text>
  </g>

  <g>
    <rect x="120" y="367" width="80" height="53" fill="url(#dataGradient)" rx="2"/>
    <text x="160" y="360" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">33</text>

    <rect x="250" y="316" width="80" height="104" fill="url(#dataGradient)" rx="2"/>
    <text x="290" y="309" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">64</text>

    <rect x="380" y="262" width="80" height="158" fill="url(#dataGradient)" rx="2"/>
    <text x="420" y="255" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">97</text>

    <rect x="510" y="222" width="80" height="198" fill="url(#dataGradient)" rx="2"/>
    <text x="550" y="215" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">120</text>

    <rect x="640" y="140" width="80" height="280" fill="#f59e0b" rx="2"/>
    <text x="680" y="133" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">175</text>
  </g>

  <text x="680" y="465" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="600">Zo = 1 000 milliards de Go</text>
