<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="dataGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bgGradient)"/>
  <text x="400" y="40" font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="middle">Volume mondial de données (zettaoctets)</text>
  <text x="400" y="64" font-size="13" fill="#94a3b8" text-anchor="middle">Source : IDC Global DataSphere Forecast — CAGR 61 %</text>

  <line x1="80" y1="420" x2="760" y2="420" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="420" x2="80" y2="100" stroke="#475569" stroke-width="1.5"/>

  <g font-size="11" fill="#94a3b8" text-anchor="end">
    <text x="72" y="424">0</text>
    <text x="72" y="344">50</text>
    <text x="72" y="264">100</text>
    <text x="72" y="184">150</text>
    <text x="72" y="124">200</text>
  </g>
  <g stroke="#334155" stroke-width="1" stroke-dasharray="4 4">
