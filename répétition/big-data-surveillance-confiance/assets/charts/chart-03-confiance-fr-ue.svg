<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bgBlue)"/>
  <text x="400" y="40" font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="middle">Confiance pour le traitement des données personnelles</text>
  <text x="400" y="64" font-size="13" fill="#94a3b8" text-anchor="middle">% de citoyens qui font confiance — France vs moyenne UE</text>

  <g font-size="14" fill="#cbd5e1" text-anchor="middle" font-weight="600">
    <text x="240" y="115">Sites internet</text>
    <text x="560" y="115">Réseaux sociaux</text>
  </g>

  <g>
    <text x="160" y="180" font-size="13" fill="#94a3b8" text-anchor="start" font-weight="500">France</text>
    <rect x="160" y="190" width="32" height="180" fill="#475569" rx="2"/>
    <rect x="160" y="246" width="32" height="124" fill="#3b82f6" rx="2"/>
    <text x="176" y="230" font-size="22" font-weight="700" fill="#60a5fa" text-anchor="middle">32 %</text>

    <text x="240" y="180" font-size="13" fill="#94a3b8" text-anchor="start" font-weight="500">Moy. UE</text>
    <rect x="240" y="190" width="32" height="180" fill="#475569" rx="2"/>
    <rect x="240" y="220" width="32" height="150" fill="#10b981" rx="2"/>
    <text x="256" y="210" font-size="22" font-weight="700" fill="#34d399" text-anchor="middle">42 %</text>
  </g>

  <g>
    <text x="480" y="180" font-size="13" fill="#94a3b8" text-anchor="start" font-weight="500">France</text>
    <rect x="480" y="190" width="32" height="180" fill="#475569" rx="2"/>
    <rect x="480" y="341" width="32" height="29" fill="#ef4444" rx="2"/>
    <text x="496" y="331" font-size="22" font-weight="700" fill="#fca5a5" text-anchor="middle">16 %</text>

    <text x="560" y="180" font-size="13" fill="#94a3b8" text-anchor="start" font-weight="500">Moy. UE</text>
    <rect x="560" y="190" width="32" height="180" fill="#475569" rx="2"/>
    <rect x="560" y="319" width="32" height="51" fill="#10b981" rx="2"/>
    <text x="576" y="309" font-size="22" font-weight="700" fill="#34d399" text-anchor="middle">29 %</text>
  </g>

  <g transform="translate(400, 420)" text-anchor="middle">
    <text font-size="14" fill="#fbbf24" font-weight="700">Mais 92 % des Européens : protection des données = droit fondamental</text>
    <text y="22" font-size="11" fill="#94a3b8">Source : Eurobaromètre — Touteleurope.eu · usine-digitale.fr</text>
  </g>
</svg>
