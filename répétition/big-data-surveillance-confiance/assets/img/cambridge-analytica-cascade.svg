<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 800" role="img">
<title>Cambridge Analytica: la cascada de extracción de datos (2013–2018) / Cambridge Analytica: the data extraction cascade (2013–2018)</title>
<desc>Diagram of the data extraction cascade in the Cambridge Analytica affair, as documented by Schneble, Elger and Shaw (2018, EMBO Reports 19(8): e46579, doi:10.15252/embr.201846579) and Hu (2020, Big Data &amp; Society 7(2), doi:10.1177/2053951720938091). A personality-test application installed by approximately 270,000 Facebook users in 2013–2014 enabled, through the platform&#39;s then-permissible friends-of-friends API permissions, the collection of personal data from approximately 87 million accounts whose owners had not granted direct consent. The harvested data was used to construct psychographic profiles along the Five-Factor (OCEAN) model and to inform political microtargeting campaigns in 2016. Diagram by Carlos Eduardo Ravello Joo.</desc>


<rect width="1280" height="800" fill="#ffffff"></rect>

<text x="60" y="62" class="t-mono" font-size="11" letter-spacing="2" fill="#c0824a">FIG. · CAMBRIDGE ANALYTICA · 2014–2018</text>
<line x1="60" y1="74" x2="1220" y2="74" stroke="#d4d6da" stroke-width="1"></line>
<text x="60" y="112" class="t-serif" font-size="26" fill="#1a1a1a">Cambridge Analytica: la cascada de extracción de datos</text>
<text x="60" y="138" class="t-sans" font-size="13" fill="#6b7280">De 270 000 voluntarios a 87 millones de perfiles vía permisos de amigos en Facebook</text>

<defs>
  <marker id="ca-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
    <path d="M0,0 L10,5 L0,10 Z" fill="#2c3e50"></path>
  </marker>
</defs>


<g transform="translate(60,200)">
  <rect x="0" y="0" width="260" height="200" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.4"></rect>
  <text x="16" y="26" class="t-mono" font-size="10" letter-spacing="1.5" fill="#c0824a">ETAPA 1 · 2013–2014</text>
  <text x="130" y="60" class="t-serif" font-size="16" text-anchor="middle" fill="#1a1a1a" font-weight="600">Aplicación de test</text>
  <text x="130" y="78" class="t-serif" font-size="16" text-anchor="middle" fill="#1a1a1a" font-weight="600">de personalidad</text>
  <text x="130" y="100" class="t-mono" font-size="11" text-anchor="middle" fill="#6b7280">«thisisyourdigitallife»</text>

  
  <rect x="40" y="120" width="180" height="22" fill="#e8b3a0" stroke="#1a1a1a" stroke-width="1"></rect>
  <text x="130" y="158" class="t-serif" font-size="20" text-anchor="middle" fill="#1a1a1a" font-weight="700">~270 000</text>
  <text x="130" y="180" class="t-sans" font-size="11" text-anchor="middle" fill="#3d4248" font-style="italic">usuarios instalan la app</text>
</g>

<text x="190" y="430" class="t-mono" font-size="11" text-anchor="middle" fill="#3d4248">consentimiento directo</text>


<g transform="translate(330,290)">
  <line x1="0" y1="10" x2="60" y2="10" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#ca-arr)"></line>
  <text x="30" y="-6" class="t-mono" font-size="10" text-anchor="middle" fill="#2c3e50">API permissions</text>
  <text x="30" y="32" class="t-sans" font-size="10" text-anchor="middle" fill="#6b7280" font-style="italic">«friends_of_friends»</text>
</g>


<g transform="translate(410,160)">
  <rect x="0" y="0" width="380" height="280" fill="#fef6e3" stroke="#c0824a" stroke-width="1.6"></rect>
  <text x="16" y="26" class="t-mono" font-size="10" letter-spacing="1.5" fill="#c0824a">ETAPA 2 · DATOS DE AMIGOS</text>
  <text x="190" y="58" class="t-serif" font-size="16" text-anchor="middle" fill="#1a1a1a" font-weight="600">Extracción a través</text>
  <text x="190" y="76" class="t-serif" font-size="16" text-anchor="middle" fill="#1a1a1a" font-weight="600">de la red social</text>

  
  <rect x="30" y="100" width="320" height="38" fill="#e8b3a0" stroke="#1a1a1a" stroke-width="1.2"></rect>
  <text x="190" y="172" class="t-serif" font-size="34" text-anchor="middle" fill="#1a1a1a" font-weight="700">~87 000 000</text>
  <text x="190" y="200" class="t-sans" font-size="12" text-anchor="middle" fill="#3d4248" font-style="italic">perfiles cuyos datos fueron recolectados</text>
  <text x="190" y="218" class="t-sans" font-size="12" text-anchor="middle" fill="#3d4248" font-style="italic">sin su conocimiento directo</text>

  
  <text x="190" y="252" class="t-mono" font-size="12" text-anchor="middle" fill="#c0824a">razón de amplificación</text>
  <text x="190" y="268" class="t-mono" font-size="13" text-anchor="middle" fill="#c0824a" font-weight="700">× 322</text>
</g>


<g transform="translate(800,290)">
  <line x1="0" y1="10" x2="60" y2="10" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#ca-arr)"></line>
  <text x="30" y="-6" class="t-mono" font-size="10" text-anchor="middle" fill="#2c3e50">modelado OCEAN</text>
  <text x="30" y="32" class="t-sans" font-size="10" text-anchor="middle" fill="#6b7280" font-style="italic">Big Five inferido</text>
</g>


<g transform="translate(880,200)">
  <rect x="0" y="0" width="300" height="200" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.4"></rect>
  <text x="16" y="26" class="t-mono" font-size="10" letter-spacing="1.5" fill="#c0824a">ETAPA 3 · 2016</text>
  <text x="150" y="60" class="t-serif" font-size="16" text-anchor="middle" fill="#1a1a1a" font-weight="600">Perfiles psicográficos</text>
  <text x="150" y="78" class="t-serif" font-size="16" text-anchor="middle" fill="#1a1a1a" font-weight="600">y microtargeting</text>

  <text x="150" y="108" class="t-mono" font-size="10.5" text-anchor="middle" fill="#6b7280">5 dimensiones × 87 M nodos</text>

  
  <g transform="translate(40,128)" class="t-mono" font-size="10" fill="#3d4248">
    <text x="0" y="0">O · Openness</text>
    <text x="0" y="14">C · Conscientiousness</text>
    <text x="0" y="28">E · Extraversion</text>
    <text x="0" y="42">A · Agreeableness</text>
    <text x="0" y="56">N · Neuroticism</text>
  </g>

  <text x="150" y="195" class="t-sans" font-size="10" text-anchor="middle" fill="#6b7280" font-style="italic">campañas políticas y comerciales</text>
</g>


<g transform="translate(60,500)">
  <text x="0" y="0" class="t-mono" font-size="10.5" letter-spacing="1.6" fill="#2c3e50">CRONOLOGÍA DOCUMENTADA</text>
  <line x1="0" y1="10" x2="1160" y2="10" stroke="#1a1a1a" stroke-width="0.8"></line>

  
