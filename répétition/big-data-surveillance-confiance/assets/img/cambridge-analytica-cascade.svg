    <text x="0" y="-12" class="t-mono" font-size="10" text-anchor="middle" fill="#c0824a">2014</text>
    <text x="0" y="46" class="t-sans" font-size="11" text-anchor="middle" fill="#3d4248">Extracción</text>
    <text x="0" y="60" class="t-sans" font-size="11" text-anchor="middle" fill="#3d4248">de datos</text>
  </g>
  <g transform="translate(520,80)">
    <circle cx="0" cy="0" r="6" fill="#1a1a1a"></circle>
    <line x1="0" y1="6" x2="0" y2="30" stroke="#9ca3af" stroke-width="0.6"></line>
